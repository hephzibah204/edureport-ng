<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance — ReportSheet</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0d4526; color: #fff; text-align: center; padding: 20px; }
.container { max-width: 480px; }
.logo { font-family: Georgia, 'Times New Roman', serif; font-size: 2rem; font-weight: 900; color: #f0c96a; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
.logo span { color: rgba(255,255,255,0.6); font-weight: 400; }
h1 { font-size: 1.6rem; margin-bottom: 0.8rem; }
p { color: rgba(255,255,255,0.7); line-height: 1.7; font-size: 0.95rem; margin-bottom: 1.5rem; }
.status { display: inline-block; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); border-radius: 100px; padding: 4px 14px; font-size: 0.75rem; color: #f0c96a; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Report<span>Sheet</span></div>
  <div class="status">Under Maintenance</div>
  <h1>We'll be back shortly</h1>
  <p>We're performing scheduled maintenance to improve your experience. Please check back soon.</p>
</div>
</body>
</html>
