services:
  api:
    image: php:8.4-cli
    working_dir: /app
    command: ["php", "-d", "variables_order=EGPCS", "-S", "0.0.0.0:3010", "-t", "php-backend/public", "php-backend/public/router.php"]
    environment:
      DB_DSN: ${DB_DSN:-sqlite:storage/edureport.sqlite}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMeNow_Use_At_Least_12Chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3010}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    ports:
      - "3010:3010"
    volumes:
      - ./:/app

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
