<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Bootstrap — EduReport NG</title>
  <link rel="stylesheet" href="../shared.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; padding: 28px 14px; }
    .wrap { width: min(520px, 92vw); }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .mono { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); word-break: break-all; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-title">Loading session…</div>
      <div class="muted" id="status">Checking login state.</div>
      <div class="mono" id="detail" style="margin-top:10px;"></div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../auth.js"></script>
  <script>
    const apiBase = (window.EDUREPORT_CONFIG?.apiBaseUrl ? String(window.EDUREPORT_CONFIG.apiBaseUrl).replace(/\/$/, '') : '');
    const loginUrl = apiBase ? (apiBase + '/adminpanel/login/') : '/adminpanel/login/';
    const status = document.getElementById('status');
    const detail = document.getElementById('detail');
    detail.textContent = apiBase ? ('API: ' + apiBase) : 'Missing EDUREPORT_CONFIG.apiBaseUrl';

    function setSessionFromMe(out) {
      const current = Auth.getSession() || {};
      const impersonationActive = Boolean(out?.impersonation?.active);
      const impersonationSchoolId = out?.impersonation?.schoolId || null;
      const effectiveUserId = out?.effectiveUser?.id || out?.user?.id || null;
      const effectiveRole = out?.effectiveUser?.role || out?.user?.role || null;
      const merged = {
        ...current,
        id: out?.user?.id,
        email: out?.user?.email,
        role: out?.user?.role,
        plan: out?.school?.plan,
        schoolName: out?.school?.name,
        impersonationActive,
        impersonationSchoolId,
        effectiveUserId,
        effectiveRole
      };
      localStorage.setItem('edu_session', JSON.stringify(merged));
    }

    (async () => {
      try {
        status.textContent = 'Fetching /me…';
        const out = await apiFetch('/me', { method: 'GET' });
        const role = out?.user?.role;
        if (role !== 'ADMIN' && role !== 'STAFF') {
          status.textContent = 'Not an admin account.';
          localStorage.removeItem('edu_session');
          location.replace('../login.html');
          return;
        }
        setSessionFromMe(out);
        status.textContent = 'Session ready. Redirecting…';
        location.replace('../admin.html');
      } catch (e) {
        status.textContent = 'Not logged in yet. Redirecting to admin login…';
        localStorage.removeItem('edu_session');
        location.replace(loginUrl);
      }
    })();
  </script>
</body>
</html>
