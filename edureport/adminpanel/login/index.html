<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — EduReport NG</title>
  <link rel="stylesheet" href="../../shared.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; padding: 28px 14px; }
    .wrap { width: min(520px, 92vw); }
    .muted { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-title">Redirecting…</div>
      <div class="muted">Opening secure admin login.</div>
      <div id="msg" class="muted" style="margin-top:10px;"></div>
    </div>
  </div>

  <script src="../../config.js"></script>
  <script>
    const api = (window.EDUREPORT_CONFIG?.apiBaseUrl ? String(window.EDUREPORT_CONFIG.apiBaseUrl).replace(/\/$/, '') : '');
    const target = api ? (api + '/adminpanel/login/') : '';
    const msg = document.getElementById('msg');
    if (!target) {
      msg.textContent = 'Missing apiBaseUrl in config.js.';
    } else {
      msg.textContent = target;
      location.replace(target);
    }
  </script>
</body>
</html>
